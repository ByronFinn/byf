name: Release

# Binary release for @byfriends/cli tags.
# Official path: bun build --compile (PRD-0020 #219–#221). MVP matrix only:
# darwin-arm64 + linux-x64.

on:
  push:
    tags:
      - '@byfriends/cli@*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  build-native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            target: darwin-arm64
            platform: darwin
          - runner: ubuntu-latest
            target: linux-x64
            platform: linux

    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - run: bun install --frozen-lockfile

      - name: Build packages
        run: bun run build:packages

      - name: Build vis (web → server)
        run: bun run build:vis

      - name: Build native binary (bun compile)
        env:
          BYF_CODE_BUILD_TARGET: ${{ matrix.target }}
        run: bun run --filter @byfriends/cli build:native:release
        shell: bash

      - name: Smoke native binary
        env:
          BYF_CODE_BUILD_TARGET: ${{ matrix.target }}
        run: bun run --filter @byfriends/cli test:native:smoke
        shell: bash

      - name: Package native artifact
        env:
          BYF_CODE_BUILD_TARGET: ${{ matrix.target }}
        run: bun run --filter @byfriends/cli package:native
        shell: bash

      # Stage compile binary into apps/cli/npm/<target>/ for optionalDep publish (#220).
      - name: Package npm platform package
        env:
          BYF_CODE_BUILD_TARGET: ${{ matrix.target }}
        run: bun run --filter @byfriends/cli package:npm-platforms
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: byf-${{ matrix.target }}
          path: apps/cli/dist-native/artifacts/byf-${{ matrix.target }}.*
          if-no-files-found: error

      - name: Upload npm platform package
        uses: actions/upload-artifact@v4
        with:
          name: npm-platform-${{ matrix.target }}
          path: apps/cli/npm/${{ matrix.target }}/
          if-no-files-found: error

  release:
    needs: build-native
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: byf-*

      - name: Download npm platform packages
        uses: actions/download-artifact@v4
        with:
          path: npm-platforms
          pattern: npm-platform-*

      - name: Resolve version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
          else
            TAG="${GITHUB_REF_NAME}"
            VERSION="${TAG#@byfriends/cli@}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=@byfriends/cli@${VERSION}" >> "$GITHUB_OUTPUT"

      - name: List artifacts
        run: find artifacts npm-platforms -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: |
            ## @byfriends/cli ${{ steps.version.outputs.version }}

            ### Installation

            ```bash
            # macOS Apple Silicon / Linux x64 (MVP platforms)
            curl -fsSL https://github.com/ByronFinn/byf/releases/latest/download/install.sh | bash

            # Or install via npm (main package + platform optionalDependency binary)
            npm install -g @byfriends/cli
            ```

            Official binaries are produced with `bun build --compile` (darwin-arm64, linux-x64).
            Other platforms are deferred.
          files: |
            install.sh
            artifacts/byf-darwin-arm64/*
            artifacts/byf-linux-x64/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Publish platform optionalDep packages so `npm i -g @byfriends/cli` can
      # resolve the native binary (PRD-0020 / #220). Main @byfriends/cli is
      # published by release-npm.yml; platform packages are published here after
      # compile so the tarball always contains the binary.
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          scope: '@byfriends'

      - name: Publish npm platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          for target in darwin-arm64 linux-x64; do
            src="npm-platforms/npm-platform-${target}"
            if [[ ! -d "$src" ]]; then
              echo "missing platform package dir: $src" >&2
              exit 1
            fi
            if [[ ! -x "$src/bin/byf" && ! -f "$src/bin/byf" ]]; then
              echo "missing binary in $src/bin/byf" >&2
              exit 1
            fi
            # Monorepo keeps private:true so changesets does not ship empty
            # platform tarballs; clear it for the real binary publish.
            node -e "
              const fs = require('fs');
              const p = process.argv[1];
              const j = JSON.parse(fs.readFileSync(p, 'utf8'));
              j.version = process.argv[2];
              delete j.private;
              fs.writeFileSync(p, JSON.stringify(j, null, 2) + '\n');
            " "$src/package.json" "$VERSION"
            echo "Publishing @byfriends/cli-${target}@${VERSION} from $src"
            # Require a ./ prefix so npm treats the argument as a local path
            # (bare "npm-platforms/..." is misparsed as a git/github specifier).
            npm publish "./$src" --access public
          done
        shell: bash
