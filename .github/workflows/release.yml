name: Release

# Binary release for @byfriends/cli tags.
# Install + package builds use Bun (PRD-0020 #216). Native SEA steps still invoke
# Node SEA scripts (require Node >=24.15.0) until #219 replaces them with
# `bun build --compile` and #221 deletes SEA. Do not expand SEA here.

on:
  push:
    tags:
      - '@byfriends/cli@*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  build-native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            target: darwin-arm64
            platform: darwin
          - runner: ubuntu-latest
            target: linux-x64
            platform: linux

    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      # Transitional: SEA pipeline (`apps/cli/scripts/native/*`) requires Node
      # >=24.15.0 for --experimental-sea-config / postject. Deadline: #219
      # (compile pipeline) then #221 (delete SEA). Remove setup-node once SEA is gone.
      - uses: actions/setup-node@v4
        with:
          node-version: '24.15.0'

      - run: bun install --frozen-lockfile

      - name: Build packages
        run: bun run build:packages

      - name: Build vis (web → server)
        run: bun run build:vis

      - name: Build native binary
        env:
          BYF_CODE_BUILD_TARGET: ${{ matrix.target }}
        # Still SEA (node scripts); #219 will switch to bun compile.
        run: bun run --filter @byfriends/cli build:native:release
        shell: bash

      - name: Package native artifact
        env:
          BYF_CODE_BUILD_TARGET: ${{ matrix.target }}
        run: bun run --filter @byfriends/cli package:native
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: byf-${{ matrix.target }}
          path: apps/cli/dist-native/artifacts/byf-${{ matrix.target }}.*
          if-no-files-found: error

  release:
    needs: build-native
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: byf-*

      - name: Resolve version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
          else
            TAG="${GITHUB_REF_NAME}"
            VERSION="${TAG#@byfriends/cli@}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=@byfriends/cli@${VERSION}" >> "$GITHUB_OUTPUT"

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: |
            ## @byfriends/cli ${{ steps.version.outputs.version }}

            ### Installation

            ```bash
            # macOS / Linux (quick install)
            curl -fsSL https://github.com/ByronFinn/byf/releases/latest/download/install.sh | bash

            # Or install via npm
            npm install -g @byfriends/cli
            ```
          files: |
            install.sh
            artifacts/byf-darwin-arm64/*
            artifacts/byf-linux-x64/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
