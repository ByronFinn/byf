name: Release

# Binary release for @byfriends/cli tags.
# Official path: bun build --compile (PRD-0020 #219). MVP matrix only:
# darwin-arm64 + linux-x64. SEA scripts remain in-tree until #221 but are not
# invoked here.

on:
  push:
    tags:
      - '@byfriends/cli@*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  build-native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            target: darwin-arm64
            platform: darwin
          - runner: ubuntu-latest
            target: linux-x64
            platform: linux

    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - run: bun install --frozen-lockfile

      - name: Build packages
        run: bun run build:packages

      - name: Build vis (web → server)
        run: bun run build:vis

      - name: Build native binary (bun compile)
        env:
          BYF_CODE_BUILD_TARGET: ${{ matrix.target }}
        run: bun run --filter @byfriends/cli build:native:release
        shell: bash

      - name: Smoke native binary
        env:
          BYF_CODE_BUILD_TARGET: ${{ matrix.target }}
        run: bun run --filter @byfriends/cli test:native:smoke
        shell: bash

      - name: Package native artifact
        env:
          BYF_CODE_BUILD_TARGET: ${{ matrix.target }}
        run: bun run --filter @byfriends/cli package:native
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: byf-${{ matrix.target }}
          path: apps/cli/dist-native/artifacts/byf-${{ matrix.target }}.*
          if-no-files-found: error

  release:
    needs: build-native
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: byf-*

      - name: Resolve version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
          else
            TAG="${GITHUB_REF_NAME}"
            VERSION="${TAG#@byfriends/cli@}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=@byfriends/cli@${VERSION}" >> "$GITHUB_OUTPUT"

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: |
            ## @byfriends/cli ${{ steps.version.outputs.version }}

            ### Installation

            ```bash
            # macOS Apple Silicon / Linux x64 (MVP platforms)
            curl -fsSL https://github.com/ByronFinn/byf/releases/latest/download/install.sh | bash

            # Or install via npm
            npm install -g @byfriends/cli
            ```

            Official binaries are produced with `bun build --compile` (darwin-arm64, linux-x64).
            Other platforms are deferred.
          files: |
            install.sh
            artifacts/byf-darwin-arm64/*
            artifacts/byf-linux-x64/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
