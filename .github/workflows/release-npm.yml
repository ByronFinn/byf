name: Release (npm)

# Publishes workspace packages to the npm registry on manual trigger.
#
# Flow (manual, single dispatch):
#   Triggered by a maintainer from the Actions tab ("Run workflow"). A single
#   run does both versioning and publishing:
#     1. Run the full quality gates + pre-publish validation.
#     2. `changeset version` consumes pending changesets, bumps versions, and
#        updates CHANGELOGs.
#     3. If anything changed, commit and push the version bump back to main
#        (using the built-in GITHUB_TOKEN), so the repo and the registry stay
#        in sync. If nothing changed, the run ends — there was nothing to ship.
#     4. `changeset publish` pushes every changed package to npm and tags it as
#        `@byfriends/<pkg>@<ver>`.
#   A `@byfriends/cli@*` tag then triggers the existing release.yml, which
#   builds the native binaries and creates the GitHub Release. The two workflows
#   connect through that tag — no manual coordination needed.
#
# Why version runs inside the workflow (not via a changesets/action PR):
#   changesets/action's default mode opens a "Version Packages" PR on every
#   push, which fits an auto-release flow but not a single manual dispatch.
#   Doing `changeset version` + commit + publish explicitly keeps one manual
#   click as one complete release.
#
# Why a guard step before publish: bare `npm publish` would ship
# workspace:/catalog: specifiers verbatim and break npm installs
# (EUNSUPPORTEDPROTOCOL). We double-check packed manifests with
# `bun run pubcheck:manifest` (`bun pm pack`) so a regression never reaches
# the registry.
#
# Toolchain (PRD-0020 / ADR 0028 / #216 / #217): install + quality gates use
# Bun 1.3.14. Publish goes through `bun scripts/with-publish-manifests.mjs
# bunx changeset publish`:
#   - Bun built-in pack rewrite is the primary protocol story (validated by
#     pubcheck); changesets itself only knows pnpm/npm, so the wrapper is the
#     explicit gap-fill (protocol rewrite + publishConfig.exports overlay).
#   - Residual root `packageManager: pnpm@…` / `pnpm-lock.yaml` may still make
#     changesets pick `pnpm publish` during transition; that residual is
#     removed by the PRD-0020 breaking minor (#221 / #222). Do not reintroduce
#     pnpm/action-setup as the install main path.

on:
  workflow_dispatch:

permissions:
  contents: write # commit the version bump + push tags
  id-token: write # reserved for future provenance (currently publishConfig.provenance: false)

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # changesets needs full history to compute versions

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      # Registry auth for publish (changeset → pack/publish). setup-node writes
      # .npmrc with NODE_AUTH_TOKEN; Bun also honors NPM_TOKEN / NODE_AUTH_TOKEN.
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          scope: '@byfriends'

      - run: bun install --frozen-lockfile

      # Quality gates — mirror the local `bun run publish` pipeline (minus the
      # final changeset publish, which runs in the Publish step below).
      - run: bun run typecheck
      - run: bun run lint
      - run: bun run fmt:check
      - run: bun run sherif
      - run: bun run test
      - run: bun run build

      # Pre-publish validation: published-layout checks (publint + attw) and a
      # guard against workspace:/catalog: leaking into shipped manifests.
      - run: bun run lint:pkg
      - run: bun run pubcheck:manifest

      # Consume pending changesets: bump versions and update CHANGELOGs.
      - name: Version
        run: bunx changeset version

      # Commit the version bump back to main so the repo reflects what was
      # published. If version produced no changes, there was nothing to release
      # — publish below is a safe no-op in that case.
      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No version changes to commit."
          else
            git add -A
            git commit -m "chore: release packages"
            git push
          fi

      - name: Publish
        # Wrapper rewrites workspace:/catalog: and expands publishConfig so
        # publish is safe whether changesets invokes pnpm or npm (see header).
        run: bun scripts/with-publish-manifests.mjs bunx changeset publish
        env:
          # Auth for registry: setup-node .npmrc + env tokens below.
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          HUSKY: '0' # skip git hooks in CI
