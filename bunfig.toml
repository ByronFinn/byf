# Bun configuration (PRD-0020 / ADR 0028 — Bun-only toolchain).
# See https://bun.com/docs/runtime/bunfig

[install]
# Isolated linker (Bun default for monorepos). Matches the former pnpm
# isolated layout: each package sees only its declared dependencies, which
# prevents phantom deps. Workspace packages resolve to their source.
linker = "isolated"
