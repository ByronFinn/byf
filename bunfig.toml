# Bun configuration (PRD-0020 / ADR 0028 — Bun-only toolchain).
# See https://bun.com/docs/runtime/bunfig

[install]
# Isolated linker (Bun default for monorepos). Matches the former pnpm
# isolated layout: each package sees only its declared dependencies, which
# prevents phantom deps. Workspace packages resolve to their source.
linker = "isolated"

[loader]
# Import .md / .yaml as raw-string modules (default export = file text).
# Source code imports prompt/profile files and parses them itself, so they
# must arrive as strings, not as Bun's built-in parsed YAML object.
#
# NOTE: Bun does not walk parent directories for bunfig.toml. Every package
# that needs these loaders (or the test preload below) must declare its own
# bunfig.toml. See apps/cli/bunfig.toml and packages/agent-core/bunfig.toml.
".md" = "text"
".yaml" = "text"


[test]
# Vitest compatibility shims (vi.hoisted, waitFor, setSystemTime, …) and
# no-op expect.addSnapshotSerializer. See build/test-preload.ts / issue #215.
preload = ["./build/test-preload.ts"]
