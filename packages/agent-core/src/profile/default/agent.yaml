name: agent
description: Default BYF agent

systemPromptPath: ./system.md
promptVars:
  roleAdditional: ''

tools:
  - Read
  - Write
  - Edit
  - Grep
  - Glob
  - Bash
  - TaskList
  - TaskOutput
  - TaskStop
  - ReadMediaFile
  - TodoList
  - Skill
  - WebSearch
  - Agent
  - FetchURL
  - AskUserQuestion
  # PRD-0019 R7: goal 工具仅在 main agent 注册（ToolManager 用
  # `agent.type === 'main'` 做注册层门控），故这里只对 main agent 生效，
  # 不会泄漏到继承但显式覆盖了 tools 的 subagent（coder/explore）。
  # loopTools 再做第二层 hasGoal 门控隐藏 mutation 工具。
  - CreateGoal
  - GetGoal
  - SetGoalBudget
  - UpdateGoal
  - mcp__*

subagents:
  coder:
    description: Good at general software engineering tasks.
  explore:
    description: Fast codebase exploration with prompt-enforced read-only behavior.
